<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlashLocum verification code</title>
  </head>
  <body style="margin:0;background:#ffffff;color:#111827;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#ffffff;margin:0;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;margin:0 auto;">
            <tr>
              <td style="padding:0 0 24px;font-size:18px;font-weight:700;color:#111827;">
                FlashLocum
              </td>
            </tr>
            <tr>
              <td style="font-size:16px;line-height:24px;color:#374151;padding:0 0 16px;">
                Your FlashLocum verification code is:
              </td>
            </tr>
            <tr>
              <td style="font-size:32px;line-height:40px;font-weight:700;letter-spacing:8px;color:#111827;padding:8px 0 24px;">
                {{ .Token }}
              </td>
            </tr>
            <tr>
              <td style="font-size:14px;line-height:22px;color:#6b7280;padding:0;">
                Enter this code in FlashLocum to verify your account. If you didn’t request this, you can safely ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
